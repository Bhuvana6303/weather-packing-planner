<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather & Packing Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=1.3">
</head>
<body>
  <div class="app-container" id="appContainer">
    <header class="app-header">
      <div class="brand">
        <span class="brand-icon">⛅</span>
        <h1>Weather & Packing Planner</h1>
      </div>
      <button class="unit-toggle" id="unitToggle" aria-label="Toggle Temperature Unit">°C</button>
    </header>

    <main class="main-content">
      <section class="search-section">
        <form class="search-form" id="searchForm">
          <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Search for a city..." autocomplete="off">
            <button type="submit" class="search-btn" aria-label="Search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
          </div>
          <button type="button" class="geo-btn" id="geoBtn" aria-label="Use Current Location">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 12 8 12s8-6.75 8-12a8 8 0 0 0-8-8z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          </button>
        </form>
        <div class="history-container" id="historyContainer"></div>
      </section>

      <div class="error-banner" id="errorBanner">
        <span class="error-icon">⚠️</span>
        <span class="error-message" id="errorMessage"></span>
      </div>

      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
      </div>

      <div class="dashboard-grid" id="dashboardGrid">
        <div class="card weather-card" id="weatherCard">
          <div class="weather-main">
            <h2 class="city-name" id="cityName">---</h2>
            <div class="weather-temp-container">
              <span class="weather-temp" id="currentTemp">--</span>
              <span class="weather-icon" id="weatherIcon">---</span>
            </div>
            <div class="weather-desc" id="weatherDesc">---</div>
          </div>
          <div class="weather-details">
            <div class="detail-item">
              <div class="detail-icon-wrapper">
                <svg class="detail-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
              </div>
              <div class="detail-info">
                <span class="detail-label">Humidity</span>
                <span class="detail-value" id="humidityVal">--</span>
              </div>
            </div>
            <div class="detail-item">
              <div class="detail-icon-wrapper">
                <svg class="detail-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path></svg>
              </div>
              <div class="detail-info">
                <span class="detail-label">Wind Speed</span>
                <span class="detail-value" id="windVal">--</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card packing-card" id="packingCard">
          <div class="packing-header">
            <h2>Packing Suggestions</h2>
            <span class="weather-meta" id="packingMeta">--</span>
          </div>
          <div class="packing-body">
            <div class="packing-list" id="packingList"></div>
          </div>
        </div>

        <section class="forecast-section hourly-section">
          <h2>Hourly Forecast</h2>
          <div class="hourly-scroll" id="hourlyScroll"></div>
        </section>

        <section class="forecast-section daily-section">
          <h2>3-Day Forecast</h2>
          <div class="daily-grid" id="dailyGrid"></div>
        </section>
      </div>
    </main>
  </div>
  <script src="app.js?v=1.3"></script>
</body>
</html>
